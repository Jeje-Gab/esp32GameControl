<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Corrida ESP - Joystick</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #111827;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .info-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .info-card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 12px 18px;
            min-width: 140px;
        }

        .info-card strong {
            display: block;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 5px;
        }

        .info-card span {
            font-size: 20px;
            font-weight: bold;
        }

        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button:hover {
            background: #16a34a;
        }

        .game-area {
            width: 500px;
            height: 600px;
            background: #374151;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border: 4px solid #0f172a;
            border-radius: 16px;
        }

        .road {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                    to right,
                    #1f2937 0%,
                    #1f2937 10%,
                    #4b5563 10%,
                    #4b5563 90%,
                    #1f2937 90%,
                    #1f2937 100%
            );
        }

        .lane-line {
            position: absolute;
            width: 8px;
            height: 80px;
            background: white;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
            animation: moveLane 1s linear infinite;
        }

        .lane-line:nth-child(1) {
            top: -80px;
        }

        .lane-line:nth-child(2) {
            top: 80px;
        }

        .lane-line:nth-child(3) {
            top: 240px;
        }

        .lane-line:nth-child(4) {
            top: 400px;
        }

        @keyframes moveLane {
            from {
                transform: translateX(-50%) translateY(0);
            }
            to {
                transform: translateX(-50%) translateY(160px);
            }
        }

        .player {
            width: 50px;
            height: 80px;
            background: #ef4444;
            position: absolute;
            bottom: 30px;
            left: 225px;
            border-radius: 12px 12px 6px 6px;
            transition: left 0.08s linear;
            z-index: 10;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.8);
        }

        .player::before {
            content: "";
            position: absolute;
            width: 32px;
            height: 20px;
            background: #93c5fd;
            top: 10px;
            left: 9px;
            border-radius: 6px;
        }

        .wheel {
            position: absolute;
            width: 10px;
            height: 18px;
            background: #020617;
            border-radius: 4px;
        }

        .wheel.left-front {
            left: -5px;
            top: 12px;
        }

        .wheel.right-front {
            right: -5px;
            top: 12px;
        }

        .wheel.left-back {
            left: -5px;
            bottom: 12px;
        }

        .wheel.right-back {
            right: -5px;
            bottom: 12px;
        }

        .obstacle {
            width: 50px;
            height: 70px;
            background: #facc15;
            position: absolute;
            top: -80px;
            border-radius: 8px;
            z-index: 8;
        }

        .status-connected {
            color: #22c55e;
        }

        .status-disconnected {
            color: #ef4444;
        }

        .controls-help {
            margin-top: 15px;
            color: #d1d5db;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .game-area {
                width: 320px;
                height: 500px;
            }

            .player {
                width: 45px;
                height: 70px;
                left: 137px;
            }
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Corrida ESP - Joystick</h1>

    <div class="info-panel">
        <div class="info-card">
            <strong>Status</strong>
            <span id="connectionStatus" class="status-disconnected">Desconectado</span>
        </div>

        <div class="info-card">
            <strong>Direção</strong>
            <span id="direction">center</span>
        </div>

        <div class="info-card">
            <strong>Posição X</strong>
            <span id="playerX">225</span>
        </div>

        <div class="info-card">
            <strong>Pontos</strong>
            <span id="score">0</span>
        </div>
    </div>

    <button onclick="startGame()">Start Game</button>

    <div class="game-area" id="gameArea">
        <div class="road">
            <div class="lane-line"></div>
            <div class="lane-line"></div>
            <div class="lane-line"></div>
            <div class="lane-line"></div>
        </div>

        <div class="player" id="player">
            <div class="wheel left-front"></div>
            <div class="wheel right-front"></div>
            <div class="wheel left-back"></div>
            <div class="wheel right-back"></div>
        </div>
    </div>

    <p class="controls-help">
        Controle o carro usando o joystick conectado na ESP.
        A ESP envia: <strong>left</strong>, <strong>right</strong> ou <strong>center</strong>.
    </p>
</div>

<script>
    const BACKEND_HTTP_URL = "http://172.20.10.7:8080";
    const BACKEND_WS_URL = "ws://localhost:8080/ws";

    const player = document.getElementById("player");
    const gameArea = document.getElementById("gameArea");

    const connectionStatus = document.getElementById("connectionStatus");
    const directionText = document.getElementById("direction");
    const playerXText = document.getElementById("playerX");
    const scoreText = document.getElementById("score");

    let socket = null;
    let score = 0;
    let obstacleInterval = null;
    let scoreInterval = null;

    function connectWebSocket() {
        socket = new WebSocket(BACKEND_WS_URL);

        socket.onopen = function () {
            console.log("WebSocket conectado");

            connectionStatus.innerText = "Conectado";
            connectionStatus.classList.remove("status-disconnected");
            connectionStatus.classList.add("status-connected");
        };

        socket.onmessage = function (event) {
            const state = JSON.parse(event.data);

            console.log("Estado recebido:", state);

            if (state.playerX !== undefined) {
                player.style.left = state.playerX + "px";
                playerXText.innerText = state.playerX;
            }

            if (state.direction !== undefined) {
                directionText.innerText = state.direction;
            }

            if (state.score !== undefined) {
                score = state.score;
                scoreText.innerText = score;
            }
        };

        socket.onclose = function () {
            console.log("WebSocket desconectado");

            connectionStatus.innerText = "Desconectado";
            connectionStatus.classList.remove("status-connected");
            connectionStatus.classList.add("status-disconnected");

            setTimeout(connectWebSocket, 2000);
        };

        socket.onerror = function (error) {
            console.error("Erro no WebSocket:", error);
        };
    }

    async function startGame() {
        try {
            const response = await fetch(`${BACKEND_HTTP_URL}/game/start`, {
                method: "POST"
            });

            const data = await response.json();

            console.log("Jogo iniciado:", data);

            score = 0;
            scoreText.innerText = score;

            clearObstacles();

            startObstacles();
            startScore();
        } catch (error) {
            console.error("Erro ao iniciar o jogo:", error);
            alert("Erro ao iniciar o jogo. Verifique se o backend está rodando.");
        }
    }

    function startScore() {
        if (scoreInterval) {
            clearInterval(scoreInterval);
        }

        scoreInterval = setInterval(() => {
            score++;
            scoreText.innerText = score;
        }, 1000);
    }

    function startObstacles() {
        if (obstacleInterval) {
            clearInterval(obstacleInterval);
        }

        obstacleInterval = setInterval(() => {
            createObstacle();
        }, 1500);
    }

    function createObstacle() {
        const obstacle = document.createElement("div");
        obstacle.classList.add("obstacle");

        const possiblePositions = [120, 225, 330];
        const randomIndex = Math.floor(Math.random() * possiblePositions.length);

        obstacle.style.left = possiblePositions[randomIndex] + "px";

        gameArea.appendChild(obstacle);

        let obstacleY = -80;

        const fallInterval = setInterval(() => {
            obstacleY += 6;
            obstacle.style.top = obstacleY + "px";

            if (checkCollision(player, obstacle)) {
                clearInterval(fallInterval);

                alert("Bateu! Fim de jogo.");

                obstacle.remove();

                stopGame();
                return;
            }

            if (obstacleY > gameArea.offsetHeight) {
                clearInterval(fallInterval);
                obstacle.remove();
            }
        }, 30);
    }

    function checkCollision(playerElement, obstacleElement) {
        const playerRect = playerElement.getBoundingClientRect();
        const obstacleRect = obstacleElement.getBoundingClientRect();

        return !(
            playerRect.top > obstacleRect.bottom ||
            playerRect.bottom < obstacleRect.top ||
            playerRect.right < obstacleRect.left ||
            playerRect.left > obstacleRect.right
        );
    }

    function stopGame() {
        if (obstacleInterval) {
            clearInterval(obstacleInterval);
        }

        if (scoreInterval) {
            clearInterval(scoreInterval);
        }

        clearObstacles();
    }

    function clearObstacles() {
        const obstacles = document.querySelectorAll(".obstacle");

        obstacles.forEach((obstacle) => {
            obstacle.remove();
        });
    }

    connectWebSocket();
</script>
</body>
</html>
